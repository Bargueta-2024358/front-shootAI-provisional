[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api"

[[headers]]
  for = "/videos/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
