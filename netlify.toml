[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api"

[[headers]]
  for = "/videos/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback and /api proxy are generated in public/_redirects by scripts/netlify-prebuild.mjs
